global
    log stdout format raw local0 info
    maxconn 1000
    lua-load /etc/haproxy/zerofox_attest.lua

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend zerofox_front
    bind *:80

    # Verify attestation inline — sets req.attest_ok
    http-request lua.zerofox_attest

    # Reject anything that failed verification
    http-request deny status 403 if !{ var(req.attest_ok) -m bool }

    # Strip attestation headers before forwarding to the origin
    http-request del-header X-ZeroFox-Ts
    http-request del-header X-ZeroFox-Token

    default_backend httpd_backend

backend httpd_backend
    server httpd httpd:80 check
