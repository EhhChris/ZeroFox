// mozilla.cfg — ZeroFox enforced lockdown configuration
// Loaded at startup by autoconfig.js. lockPref() values are enforced for all
// profiles and cannot be overridden by prefs.js, about:config, or any user action.
// The autoconfig parser skips the first line of this file — real content starts here.

// ── Disk cache: all off, memory cache only ────────────────────────────────────
lockPref("browser.cache.disk.enable", false);
lockPref("browser.cache.disk.smart_size.enabled", false);
lockPref("browser.cache.disk.capacity", 0);
lockPref("browser.cache.disk.max_entry_size", 0);
lockPref("browser.cache.offline.enable", false);
lockPref("browser.cache.offline.capacity", 0);
// Memory cache: keep enabled, let Firefox auto-size based on available RAM.
// -1 = auto (~256 MB on 16 GB RAM). Affects HTTP resource cache only, not per-tab RAM.
lockPref("browser.cache.memory.enable", true);
lockPref("browser.cache.memory.capacity", -1);

// ── Private browsing: always on ───────────────────────────────────────────────
// Keeps history, form data, cookies in memory only. Belt-and-suspenders for ramdisk profile.
lockPref("browser.privatebrowsing.autostart", true);

// ── Session restore: disabled ─────────────────────────────────────────────────
lockPref("browser.sessionstore.resume_from_crash", false);
lockPref("browser.sessionstore.max_tabs_undo", 0);
lockPref("browser.sessionstore.max_windows_undo", 0);
lockPref("browser.sessionstore.interval", 2147483647); // Effectively disable writes

// ── Downloads: block all to disk ─────────────────────────────────────────────
// Policy sets PromptForDownloadLocation false; patch 004 enforces the actual block.
lockPref("browser.download.useDownloadDir", false);
lockPref("browser.download.forbid_open_with", true);
lockPref("browser.download.always_ask_before_handling_new_types", true);
lockPref("browser.download.manager.retention", 0);
lockPref("browser.download.start_downloads_in_tmp_dir", false);
lockPref("browser.helperApps.deleteTempFileOnExit", true);

// ── Extensions: disabled ─────────────────────────────────────────────────────
// Belt-and-suspenders alongside ExtensionSettings policy and patch 011.
lockPref("xpinstall.enabled", false);

// ── Screensharing ─────────────────────────────────────────────────────────────
// Belt-and-suspenders for patch 002.
lockPref("media.getusermedia.screensharing.enabled", false);
lockPref("media.getusermedia.browser.enabled", false);
lockPref("media.getusermedia.window.focus_source.enabled", false);

// ── Developer tools ───────────────────────────────────────────────────────────
// Belt-and-suspenders alongside DisableDeveloperTools policy and patch 008.
lockPref("devtools.policy.disabled", true);
lockPref("devtools.chrome.enabled", false);
lockPref("devtools.debugger.remote-enabled", false);
lockPref("devtools.debugger.prompt-connection", false);

// ── Clipboard ─────────────────────────────────────────────────────────────────
// Belt-and-suspenders alongside patch 003.
lockPref("dom.allow_cut_copy", false);
lockPref("dom.event.clipboardevents.enabled", false);

// ── Printing ─────────────────────────────────────────────────────────────────
// Belt-and-suspenders alongside DisablePrinting policy and patch 005.
// print.enabled=false causes PrintOuter to return before reaching C++.
lockPref("print.enabled", false);

// ── Screenshots (built-in) ────────────────────────────────────────────────────
// Belt-and-suspenders alongside DisableScreenshots policy.
lockPref("extensions.screenshots.disabled", true);

// ── Telemetry and diagnostics: all off ───────────────────────────────────────
// Belt-and-suspenders alongside DisableTelemetry policy and patch 010.
// healthreport.uploadEnabled is read by Glean at fog_init() time.
lockPref("datareporting.policy.dataSubmissionEnabled", false);
lockPref("datareporting.healthreport.uploadEnabled", false);
lockPref("toolkit.telemetry.enabled", false);
lockPref("toolkit.telemetry.unified", false);
lockPref("datareporting.policy.dataSubmissionPolicyBypassNotification", true);

// ── WebRTC (prevents IP leaks, also needed for screenshare) ───────────────────
lockPref("media.peerconnection.enabled", false);
lockPref("media.navigator.enabled", false);
lockPref("media.peerconnection.ice.no_host", true);
lockPref("media.peerconnection.ice.proxy_only", true);

// ── Fingerprinting resistance ─────────────────────────────────────────────────
lockPref("privacy.resistFingerprinting", true);
lockPref("privacy.resistFingerprinting.block_mozAddonManager", true);

// ── Tracking protection ───────────────────────────────────────────────────────
lockPref("privacy.trackingprotection.enabled", true);
lockPref("privacy.trackingprotection.socialtracking.enabled", true);
lockPref("privacy.trackingprotection.cryptomining.enabled", true);
lockPref("privacy.trackingprotection.fingerprinting.enabled", true);

// ── Network: reduce prefetch/speculation ─────────────────────────────────────
lockPref("network.dns.disablePrefetch", true);
lockPref("network.dns.disablePrefetchFromHTTPS", true);
lockPref("network.prefetch-next", false);
lockPref("network.predictor.enabled", false);
lockPref("network.http.speculative-parallel-limit", 0);
lockPref("network.proxy.socks_remote_dns", true);

// ── Geolocation ───────────────────────────────────────────────────────────────
lockPref("geo.enabled", false);

// ── Misc: no disk-touching features ──────────────────────────────────────────
lockPref("browser.formfill.enable", false);
lockPref("signon.rememberSignons", false);
lockPref("extensions.formautofill.available", "off");
lockPref("browser.urlbar.suggest.history", false);
lockPref("browser.urlbar.suggest.bookmark", false);
lockPref("places.history.enabled", false);
